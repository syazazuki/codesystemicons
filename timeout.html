<!DOCTYPE html>
<html>
<head>
<title>TIME OUT</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#1a0000;
font-family:Arial;
color:red;
text-align:center;
animation:flash 0.3s infinite;
}

@keyframes flash{

0%{background:#1a0000;}
50%{background:#660000;}
100%{background:#1a0000;}
}

.box{
padding:50px;
border:4px solid red;
border-radius:25px;
box-shadow:0 0 35px red;
background:black;
}

h1{
font-size:80px;
}

p{
font-size:30px;
line-height:1.8;
}

</style>
</head>

<body>

<div class="box">

<h1>TIME OUT</h1>

<p>

PASS TURN TO<br>
NEXT GROUP<br><br>

IF NO GROUP IS WAITING,<br>
CONTINUE ONLY WITH<br>
INSTRUCTOR PERMISSION

</p>

</div>

</body>
</html>
